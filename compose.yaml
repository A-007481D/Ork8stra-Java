services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=ork8stra'
      - 'POSTGRES_PASSWORD=malik'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5435:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  rabbitmq:
    image: 'rabbitmq:3-management'
    environment:
      - 'RABBITMQ_DEFAULT_USER=ork8stra'
      - 'RABBITMQ_DEFAULT_PASS=ork8stra'
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  minio:
    image: 'minio/minio:latest'
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=ork8stra'
      - 'MINIO_ROOT_PASSWORD=ork8stra123'
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  minio_data:
