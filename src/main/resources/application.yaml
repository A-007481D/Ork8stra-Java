server:
  port: 8080

spring:
  application:
    name: ork8stra
  datasource:
    url: jdbc:postgresql://localhost:5435/ork8stra
    username: postgres
    password: malik
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# jwt conf
app:
  jwt:
    secret: ${JWT_SECRET:your_jwt_secret_key_base64}
    expiration-ms: 86400000
    issuer: ork8stra
