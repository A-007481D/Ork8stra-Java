server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ork8stra
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5435}/${POSTGRES_DB:ork8stra}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:malik}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:ork8stra}
    password: ${RABBITMQ_PASSWORD:ork8stra}

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# jwt conf
app:
  jwt:
    secret: ${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5zYW5kaXRzaG91bGRiZWF0bGVhc3QyNTZiaXRz}
    expiration-ms: 86400000
    issuer: ork8stra

# oauth conf
oauth2:
  github:
    client-id: ${GITHUB_CLIENT_ID:Ov23limjKNqfBJLABEXE}
    client-secret: ${GITHUB_CLIENT_SECRET:46f239ff0ae5a34ecc8b9cd426e5b38acc9f8504}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:ork8stra-logs}

kubelite:
  base-domain: ${KUBELITE_BASE_DOMAIN:local.kubelite.io}
