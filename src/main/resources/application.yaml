server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ork8stra
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5435}/${POSTGRES_DB:ork8stra}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:ork8stra}
    password: ${RABBITMQ_PASSWORD:password}

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# jwt conf
app:
  jwt:
    secret: ${JWT_SECRET:your_jwt_secret_key_base64}
    expiration-ms: 86400000
    issuer: ork8stra
